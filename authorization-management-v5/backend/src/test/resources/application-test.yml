server:
  port: 8085

spring:
  application:
    name: authorization-management-v5-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: false

logging:
  level:
    com.auth.letter: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE