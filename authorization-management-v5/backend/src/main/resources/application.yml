server:
  port: 8085

spring:
  application:
    name: authorization-management-v5
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.auth.letter: DEBUG
    org.hibernate.SQL: DEBUG