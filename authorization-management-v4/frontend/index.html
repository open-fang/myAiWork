<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权书管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        #app { min-height: 100vh; }
        .nav-header { background: #409eff; color: white; padding: 0 20px; height: 50px; display: flex; align-items: center; }
        .nav-header h1 { font-size: 18px; font-weight: 500; }
        .nav-menu { display: flex; gap: 20px; margin-left: auto; }
        .nav-menu a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; }
        .nav-menu a:hover { background: rgba(255,255,255,0.1); }
        .nav-menu a.active { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="app">
        <div class="nav-header">
            <h1>授权书管理系统</h1>
            <div class="nav-menu">
                <a href="#/AuthLetterList" :class="{ active: currentRoute === '/AuthLetterList' }">授权书列表</a>
                <a href="#/RuleParamConfig" :class="{ active: currentRoute === '/RuleParamConfig' }">规则参数配置</a>
            </div>
        </div>
        <component :is="currentView"></component>
    </div>

    <script src="src/views/AuthLetterList.js"></script>
    <script src="src/views/AuthLetterDetail.js"></script>
    <script src="src/views/RuleParamConfig.js"></script>
    <script>
        const routes = {
            '/AuthLetterList': 'auth-letter-list',
            '/AuthLetterDetail': 'auth-letter-detail',
            '/RuleParamConfig': 'rule-param-config'
        };

        new Vue({
            el: '#app',
            data: {
                currentRoute: window.location.hash.slice(1) || '/AuthLetterList'
            },
            computed: {
                currentView() {
                    return routes[this.currentRoute] || 'auth-letter-list';
                }
            },
            mounted() {
                window.addEventListener('hashchange', () => {
                    this.currentRoute = window.location.hash.slice(1) || '/AuthLetterList';
                });
            }
        });
    </script>
</body>
</html>
