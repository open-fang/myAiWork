spring:
  application:
    name: authorization-management-v4-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.auth.letter.entity
  configuration:
    map-underscore-to-camel-case: true

flyway:
  enabled: false

logging:
  level:
    com.auth.letter: DEBUG